<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS 瞄准控制器 - 预览</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --bg-dark: #0f0f1a;
    --bg-card: rgba(30, 30, 50, 0.8);
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --border: rgba(255, 255, 255, 0.1);
}

body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
}

.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
}

/* Header */
header {
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}

.header-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
}

h1 {
    font-size: 28px;
    font-weight: 600;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.status-bar {
    display: flex;
    gap: 24px;
}

.status-item {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.status-label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.status-value {
    font-size: 18px;
    font-weight: 600;
    color: var(--success);
}

/* Tabs */
.tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
}

.tab-btn {
    flex: 1;
    padding: 14px 24px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 500;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
}

.tab-btn:hover {
    background: rgba(99, 102, 241, 0.1);
    border-color: var(--primary);
    color: var(--text);
}

.tab-btn.active {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border-color: transparent;
    color: white;
    box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
}

/* Main Content */
main {
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    padding: 24px;
    border: 1px solid var(--border);
    min-height: 400px;
}

/* Param Groups */
.param-group {
    margin-bottom: 24px;
    padding: 20px;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 12px;
    border: 1px solid var(--border);
}

.param-group h3 {
    color: var(--primary);
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
}

.param-row {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
    gap: 12px;
}

.param-row label {
    flex: 0 0 140px;
    font-size: 14px;
    color: var(--text-muted);
}

.param-row input[type="range"] {
    flex: 1;
    height: 6px;
    -webkit-appearance: none;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px;
    outline: none;
}

.param-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    background: var(--primary);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 10px rgba(99, 102, 241, 0.5);
    transition: transform 0.2s;
}

.param-row input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
}

.param-value {
    width: 70px;
    text-align: right;
    font-size: 14px;
    font-weight: 600;
    color: var(--success);
    font-family: 'Consolas', monospace;
}

/* Footer */
footer {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
}

button {
    padding: 14px 32px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 30px rgba(99, 102, 241, 0.5);
}

.btn-secondary {
    background: rgba(255, 255, 255, 0.1);
    color: var(--text);
    border: 1px solid var(--border);
}

.btn-secondary:hover {
    background: rgba(255, 255, 255, 0.15);
}

/* Loading */
.loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
    color: var(--text-muted);
}

.spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 16px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Toast */
.toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    padding: 16px 32px;
    border-radius: 12px;
    border: 1px solid var(--border);
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 1000;
}

.toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
}

.toast.success {
    border-color: var(--success);
    color: var(--success);
}

.toast.error {
    border-color: var(--danger);
    color: var(--danger);
}

/* Responsive */
@media (max-width: 600px) {
    .container {
        padding: 12px;
    }
    
    .header-content {
        flex-direction: column;
        text-align: center;
    }
    
    .status-bar {
        justify-content: center;
    }
    
    .tabs {
        flex-direction: column;
    }
    
    .param-row {
        flex-wrap: wrap;
    }
    
    .param-row label {
        flex: 0 0 100%;
        margin-bottom: 4px;
    }
    
    .param-row input[type="range"] {
        flex: 1;
    }
    
    footer {
        flex-direction: column;
    }
    
    footer button {
        width: 100%;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>🎯 瞄准控制器</h1>
                <div class="status-bar">
                    <div class="status-item">
                        <span class="status-label">状态</span>
                        <span id="status" class="status-value" style="color: #22c55e;">运行中</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">FPS</span>
                        <span id="fps" class="status-value">60</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">误差</span>
                        <span id="error" class="status-value">12.5, 8.3</span>
                    </div>
                </div>
            </div>
        </header>
        
        <nav class="tabs">
            <button class="tab-btn active" data-tab="advanced">高级PID</button>
            <button class="tab-btn" data-tab="standard">标准PID</button>
            <button class="tab-btn" data-tab="chris">ChrisPID</button>
        </nav>
        
        <main id="content">
            <!-- 高级PID参数 -->
            <div class="param-group">
                <h3>📊 P增益</h3>
                <div class="param-row">
                    <label>P最小值</label>
                    <input type="range" min="0" max="1" step="0.01" value="0.15">
                    <span class="param-value">0.15</span>
                </div>
                <div class="param-row">
                    <label>P最大值</label>
                    <input type="range" min="0" max="1" step="0.01" value="0.60">
                    <span class="param-value">0.60</span>
                </div>
                <div class="param-row">
                    <label>P斜率</label>
                    <input type="range" min="0" max="3" step="0.01" value="1.20">
                    <span class="param-value">1.20</span>
                </div>
            </div>
            
            <div class="param-group">
                <h3>📉 D增益</h3>
                <div class="param-row">
                    <label>D系数</label>
                    <input type="range" min="0" max="0.1" step="0.001" value="0.015">
                    <span class="param-value">0.015</span>
                </div>
                <div class="param-row">
                    <label>D滤波系数</label>
                    <input type="range" min="0" max="1" step="0.01" value="1.00">
                    <span class="param-value">1.00</span>
                </div>
            </div>
            
            <div class="param-group">
                <h3>📈 I增益</h3>
                <div class="param-row">
                    <label>I系数</label>
                    <input type="range" min="0" max="0.1" step="0.001" value="0.002">
                    <span class="param-value">0.002</span>
                </div>
            </div>
            
            <div class="param-group">
                <h3>🔮 预测</h3>
                <div class="param-row">
                    <label>预测权重X</label>
                    <input type="range" min="0" max="2" step="0.01" value="0.80">
                    <span class="param-value">0.80</span>
                </div>
                <div class="param-row">
                    <label>预测权重Y</label>
                    <input type="range" min="0" max="2" step="0.01" value="0.80">
                    <span class="param-value">0.80</span>
                </div>
                <div class="param-row">
                    <label>最大预测时间</label>
                    <input type="range" min="0" max="0.5" step="0.01" value="0.10">
                    <span class="param-value">0.10</span>
                </div>
            </div>
            
            <div class="param-group">
                <h3>🌊 平滑</h3>
                <div class="param-row">
                    <label>X轴平滑</label>
                    <input type="range" min="0" max="1" step="0.01" value="0.30">
                    <span class="param-value">0.30</span>
                </div>
                <div class="param-row">
                    <label>Y轴平滑</label>
                    <input type="range" min="0" max="1" step="0.01" value="0.30">
                    <span class="param-value">0.30</span>
                </div>
            </div>
            
            <div class="param-group">
                <h3>⚙️ 限制</h3>
                <div class="param-row">
                    <label>最大移动像素</label>
                    <input type="range" min="0" max="300" step="1" value="100">
                    <span class="param-value">100</span>
                </div>
                <div class="param-row">
                    <label>死区像素</label>
                    <input type="range" min="0" max="50" step="1" value="5">
                    <span class="param-value">5</span>
                </div>
            </div>
        </main>
        
        <footer>
            <button id="save-btn" class="btn-primary">💾 保存配置</button>
            <button id="reset-btn" class="btn-secondary">🔄 重置</button>
        </footer>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script>
// 预览模式：模拟数据交互
document.addEventListener('DOMContentLoaded', () => {
    setupTabs();
    setupSliders();
    setupButtons();
});

function setupTabs() {
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelector('.tab-btn.active').classList.remove('active');
            btn.classList.add('active');
            showToast('切换到 ' + btn.textContent, 'success');
        });
    });
}

function setupSliders() {
    document.querySelectorAll('input[type="range"]').forEach(slider => {
        slider.addEventListener('input', (e) => {
            const value = parseFloat(e.target.value);
            const step = parseFloat(e.target.step);
            e.target.nextElementSibling.textContent = formatValue(value, step);
        });
    });
}

function setupButtons() {
    document.getElementById('save-btn').addEventListener('click', () => {
        showToast('配置保存成功！（预览模式）', 'success');
    });
    
    document.getElementById('reset-btn').addEventListener('click', () => {
        showToast('配置已重置（预览模式）', 'success');
    });
}

function formatValue(value, step) {
    if (step >= 1) return value.toFixed(0);
    if (step >= 0.01) return value.toFixed(2);
    return value.toFixed(3);
}

function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast ' + type + ' show';
    
    setTimeout(() => {
        toast.classList.remove('show');
    }, 3000);
}

// 模拟实时状态更新
setInterval(() => {
    const fps = 55 + Math.floor(Math.random() * 10);
    document.getElementById('fps').textContent = fps;
    
    const errX = (Math.random() * 20 - 10).toFixed(1);
    const errY = (Math.random() * 20 - 10).toFixed(1);
    document.getElementById('error').textContent = `${errX}, ${errY}`;
}, 1000);
    </script>
</body>
</html>
