<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS 瞄准控制器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 20px 0; border-bottom: 1px solid #333; }
        h1 { margin: 0 0 10px; font-size: 24px; }
        .status { color: #888; font-size: 14px; }
        nav { display: flex; gap: 10px; padding: 20px 0; }
        .tab-btn { 
            flex: 1; 
            padding: 10px 20px; 
            background: #333; 
            border: 1px solid #555; 
            color: #fff; 
            cursor: pointer;
            border-radius: 5px;
        }
        .tab-btn.active { background: #4CAF50; border-color: #4CAF50; }
        .tab-btn:hover { background: #555; }
        main { padding: 20px 0; }
        .param-group { margin-bottom: 20px; }
        .param-group h3 { 
            color: #4CAF50; 
            margin-bottom: 10px; 
            font-size: 16px;
        }
        .param-row { 
            display: flex; 
            align-items: center; 
            margin-bottom: 10px;
        }
        .param-row label { 
            flex: 0 0 150px; 
            font-size: 14px;
        }
        .param-row input[type="range"] { 
            flex: 1; 
            padding: 5px;
        }
        .param-value { 
            width: 60px; 
            text-align: right; 
            font-size: 14px;
            color: #4CAF50;
        }
        footer { 
            text-align: center; 
            padding: 20px; 
            border-top: 1px solid #333;
            margin-top: 20px;
        }
        footer button { 
            padding: 10px 30px; 
            margin: 0 10px; 
            background: #4CAF50; 
            border: none; 
            color: #fff; 
            cursor: pointer;
            border-radius: 5px;
            font-size: 14px;
        }
        footer button:hover { background: #45a049; }
        .loading { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>瞄准控制器参数</h1>
            <div class="status">状态: <span id="status">加载中...</span></div>
        </header>
        
        <nav>
            <button class="tab-btn active" data-tab="advanced">高级PID</button>
            <button class="tab-btn" data-tab="standard">标准PID</button>
            <button class="tab-btn" data-tab="chris">ChrisPID</button>
        </nav>
        
        <main id="content">
            <p class="loading">加载中...</p>
        </main>
        
        <footer>
            <button id="save-btn">保存配置</button>
            <button id="reset-btn">重置</button>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
